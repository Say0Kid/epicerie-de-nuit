<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Épicerie de Nuit - Cyberpunk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neonBg: '#050a1f', neonPink: '#ff00ff', neonBlue: '#00f2ff', neonYellow: '#ffea00' },
                    fontFamily: { bungee: ['Bungee', 'cursive'], inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050a1f; color: white; overflow-x: hidden; }
        .font-bungee { font-family: 'Bungee', cursive; }
        .glow-pink { text-shadow: 0 0 10px #ff00ff; }
        .glow-blue { text-shadow: 0 0 10px #00f2ff; }
        .glow-yellow { text-shadow: 0 0 10px #ffea00; }
        .glass-card { background: rgba(0, 242, 255, 0.05); backdrop-filter: blur(10px); border: 2px solid #00f2ff; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .nav-link { font-family: 'Bungee'; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="w-full flex justify-between items-center py-4 px-8 border-b border-neonBlue/20">
        <div class="nav-link">☰ MENU</div>
        <div class="nav-link text-neonBlue" onclick="toggleCart()">🛒 PANIER (<span id="cart-count">0</span>)</div>
        <div class="nav-link text-neonYellow" onclick="window.location.href='admin.html'">👤 ADMIN</div>
        <div class="nav-link">🚚 SUIVI</div>
    </nav>

    <header class="text-center my-10">
        <h1 class="text-5xl md:text-7xl text-neonYellow glow-yellow italic font-bungee">ÉPICERIE</h1>
        <h1 class="text-6xl md:text-8xl text-neonPink glow-pink -mt-4 font-bungee">DE NUIT</h1>
        <div class="inline-block bg-white text-black px-6 py-1 mt-4 font-bungee text-xl -rotate-2">OUVERT 7J/7</div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 px-4 pb-20">
        
        <section class="glass-card p-6">
            <h3 class="text-neonBlue font-bungee mb-6 border-b border-neonBlue/30 pb-2">🥤 BOISSONS</h3>
            <div id="cat-boissons" class="space-y-4"></div>
        </section>

        <section class="glass-card p-6">
            <h3 class="text-neonPink font-bungee mb-6 border-b border-neonPink/30 pb-2">🍿 SNACKS</h3>
            <div id="cat-snacks" class="space-y-4"></div>
        </section>

        <section class="glass-card p-6">
            <h3 class="text-neonYellow font-bungee mb-6 border-b border-neonYellow/30 pb-2">📍 LIVE TRACKER</h3>
            <div class="relative h-64 bg-slate-900 rounded-lg border border-neonBlue/50 overflow-hidden">
                <div class="absolute inset-0 opacity-30 bg-[url('https://www.google.com/maps/vt/pb=!1m4!1m3!1i13!2i4121!3i2702!2m3!1e0!2sm!3i411084220!3m8!2sen!3sus!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!1f2!23i1301875')] bg-center"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-5xl animate-bounce">🛵</span>
                </div>
            </div>
            <div class="mt-4 p-3 bg-white/5 rounded text-xs text-center text-neonBlue italic">Livraison estimée : 20-30 min</div>
        </section>
    </main>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-md p-8 border-neonPink shadow-[0_0_30px_#ff00ff]">
            <h2 class="text-3xl font-bungee text-neonYellow glow-yellow mb-6 text-center">PANIER</h2>
            <div id="cart-items" class="space-y-4 max-h-60 overflow-y-auto mb-6"></div>
            <div class="flex justify-between font-bungee text-2xl border-t border-white/20 pt-4 mb-6">
                <span>TOTAL:</span>
                <span id="cart-total" class="text-neonPink">0.00€</span>
            </div>
            <button onclick="checkout()" class="w-full py-4 bg-neonPink font-bungee text-white rounded-full shadow-lg hover:scale-105 transition">COMMANDER (WHATSAPP)</button>
            <button onclick="toggleCart()" class="w-full mt-4 text-xs text-white/50 font-bungee">FERMER</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sthiubznmgzunzvdcvvy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Edkq-HmnWrrsoln89X24XQ_K5bSTO6Z';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let products = [];
        let cart = [];

        async function fetchProducts() {
            const { data, error } = await supabase.from('produits').select('*');
            if (!error) {
                products = data;
                renderProducts();
            }
        }

        function renderProducts() {
            const cats = { boissons: document.getElementById('cat-boissons'), snacks: document.getElementById('cat-snacks') };
            Object.values(cats).forEach(c => c.innerHTML = '');

            products.forEach(p => {
                const html = `
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg border border-neonBlue/20">
                        <div class="flex items-center gap-3">
                            <img src="${p.image_url}" class="w-12 h-12 object-contain">
                            <div>
                                <p class="font-bold text-sm">${p.nom}</p>
                                <p class="text-neonPink font-bungee">${p.prix}€</p>
                            </div>
                        </div>
                        <button onclick="addToCart('${p.id}')" class="bg-neonBlue/10 border border-neonBlue text-neonBlue px-3 py-1 rounded-full font-bungee hover:bg-neonBlue hover:text-black">+</button>
                    </div>`;
                if (cats[p.categorie]) cats[p.categorie].innerHTML += html;
            });
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            const exists = cart.find(item => item.id === id);
            exists ? exists.qty++ : cart.push({...p, qty: 1});
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
            document.getElementById('cart-total').innerText = cart.reduce((a, b) => a + (b.prix * b.qty), 0).toFixed(2) + '€';
            document.getElementById('cart-items').innerHTML = cart.map(item => `
                <div class="flex justify-between text-sm">
                    <span>${item.qty}x ${item.nom}</span>
                    <span class="text-neonBlue">${(item.prix * item.qty).toFixed(2)}€</span>
                </div>
            `).join('');
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        async function checkout() {
            if (cart.length === 0) return;
            const total = cart.reduce((a, b) => a + (b.prix * b.qty), 0);
            const msg = `Nouvelle commande :\n` + cart.map(i => `- ${i.qty}x ${i.nom}`).join('\n') + `\nTotal: ${total}€`;
            
            // Sauvegarde Supabase
            await supabase.from('commandes').insert([{ contenu: cart, total: total }]);
            
            window.open(`https://wa.me/33745517494?text=${encodeURIComponent(msg)}`, '_blank');
            cart = []; updateUI(); toggleCart();
        }

        fetchProducts();
    </script>
</body>
</html>
