<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Gestion Épicerie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-8">GESTION DES PRODUITS</h1>
    <div class="bg-slate-800 rounded-lg overflow-hidden shadow-xl">
        <table class="w-full text-left">
            <thead class="bg-slate-700">
                <tr>
                    <th class="p-4">Produit</th>
                    <th class="p-4">Prix (€)</th>
                    <th class="p-4">Stock</th>
                    <th class="p-4">Action</th>
                </tr>
            </thead>
            <tbody id="admin-list"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://sthiubznmgzunzvdcvvy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Edkq-HmnWrrsoln89X24XQ_K5bSTO6Z';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function load() {
            const { data } = await supabase.from('produits').select('*');
            document.getElementById('admin-list').innerHTML = data.map(p => `
                <tr class="border-b border-slate-700">
                    <td class="p-4">${p.nom}</td>
                    <td class="p-4"><input id="p-${p.id}" type="number" step="0.1" value="${p.prix}" class="bg-slate-900 px-2 py-1"></td>
                    <td class="p-4"><input id="s-${p.id}" type="number" value="${p.stock}" class="bg-slate-900 px-2 py-1"></td>
                    <td class="p-4"><button onclick="save('${p.id}')" class="bg-blue-600 px-4 py-1 rounded">OK</button></td>
                </tr>
            `).join('');
        }

        async function save(id) {
            const prix = document.getElementById(`p-${id}`).value;
            const stock = document.getElementById(`s-${id}`).value;
            await supabase.from('produits').update({ prix, stock }).eq('id', id);
            alert('Modifié !');
        }
        load();
    </script>
</body>
</html>
